services:
  api:
    build: .
    container_name: storepulse-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    command: ["node", "server.js"]

  worker:
    build: .
    container_name: storepulse-worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["node","flush-worker.js"]
